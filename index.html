<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Forca</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f2027;
    color: white;
}

h1 { margin-top: 20px; }

button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
}

#palavra {
    font-size: 30px;
    letter-spacing: 10px;
    margin: 20px;
}

.vitoria { color: #00ff88; }
.derrota { color: red; }

select {
    padding: 8px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🪓 FORCA</h1>

<p>
Categoria:
<select id="categoria" onchange="iniciar()">
    <option value="animais">Animais</option>
    <option value="frutas">Frutas</option>
    <option value="paises">Países</option>
</select>
</p>

<p id="info"></p>
<div id="palavra"></div>
<p id="status"></p>
<div id="letras"></div>

<script>
const PALAVRAS = {
    animais: ["gato","elefante","tigre","girafa","leao","urso","panda","macaco"],
    frutas: ["banana","maca","uva","manga","abacaxi","pera","morango"],
    paises: ["brasil","canada","japao","mexico","espanha","egito","alemanha"]
};

let palavra = "";
let letras = [];
let erros = 0;
let pontos = 0;
let inicio;
const MAX_ERROS = 6;

function iniciar() {
    const categoria = document.getElementById("categoria").value;
    palavra = PALAVRAS[categoria][Math.floor(Math.random()*PALAVRAS[categoria].length)];
    letras = [];
    erros = 0;
    pontos = 0;
    inicio = Date.now();
    render();
}

function render() {
    const tempo = Math.floor((Date.now() - inicio) / 1000);

    document.getElementById("info").innerText =
        `Tempo: ${tempo}s | Erros: ${erros}/${MAX_ERROS} | Pontos: ${pontos}`;

    const palavraMostrada = palavra
        .split("")
        .map(l => letras.includes(l) ? l : "_")
        .join(" ");

    document.getElementById("palavra").innerText = palavraMostrada;

    const ganhou = !palavraMostrada.includes("_");
    const perdeu = erros >= MAX_ERROS;

    if (ganhou) {
        document.getElementById("status").innerHTML =
            `<span class="vitoria">🎉 Você venceu! Pontos: ${pontos}</span><br><button onclick="iniciar()">Jogar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    if (perdeu) {
        document.getElementById("status").innerHTML =
            `<span class="derrota">💀 Você perdeu! Palavra: ${palavra}</span><br><button onclick="iniciar()">Tentar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    document.getElementById("status").innerText = "";

    const alfabeto = "abcdefghijklmnopqrstuvwxyz";

    document.getElementById("letras").innerHTML = alfabeto
        .split("")
        .map(l => {
            if (letras.includes(l)) return "";
            return `<button onclick="jogar('${l}')">${l}</button>`;
        })
        .join("");
}

function jogar(letra) {
    letras.push(letra);

    if (palavra.includes(letra)) {
        pontos += 10;
    } else {
        erros++;
        pontos -= 5;
    }

    render();
}

// iniciar ao carregar
iniciar();
</script>

</body>
</html>
