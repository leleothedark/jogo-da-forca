<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forca Pro</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f2027;
    color: white;
}

canvas {
    background: #222;
    margin: 10px;
    border-radius: 10px;
}

button {
    margin: 4px;
    padding: 10px;
    font-size: 16px;
}

.vitoria { color: #00ff88; }
.derrota { color: red; }
</style>
</head>

<body>

<h1>🪓 FORCA PRO</h1>

<p>
Categoria:
<select id="categoria" onchange="iniciar()">
<option value="animais">Animais</option>
<option value="frutas">Frutas</option>
<option value="paises">Países</option>
</select>
</p>

<p>
Dificuldade:
<select id="dificuldade" onchange="iniciar()">
<option value="facil">Fácil</option>
<option value="medio">Médio</option>
<option value="dificil">Difícil</option>
</select>
</p>

<canvas id="forca" width="200" height="200"></canvas>

<p id="info"></p>
<div id="palavra"></div>
<p id="status"></p>
<div id="letras"></div>

<p>🏆 Recorde: <span id="recorde">0</span></p>

<audio id="acerto" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const PALAVRAS = {
    animais: ["gato","elefante","tigre","girafa","leao","urso","panda","macaco"],
    frutas: ["banana","maca","uva","manga","abacaxi","pera","morango"],
    paises: ["brasil","canada","japao","mexico","espanha","egito","alemanha"]
};

let palavra = "";
let letras = [];
let erros = 0;
let pontos = 0;
let inicio;
let recorde = localStorage.getItem("recorde") || 0;

document.getElementById("recorde").innerText = recorde;

const MAX_ERROS_BASE = 6;

function iniciar() {
    const categoria = document.getElementById("categoria").value;
    const dificuldade = document.getElementById("dificuldade").value;

    palavra = PALAVRAS[categoria][Math.floor(Math.random()*PALAVRAS[categoria].length)];
    letras = [];
    erros = 0;
    pontos = 0;
    inicio = Date.now();

    if (dificuldade === "facil") max_erros = 8;
    else if (dificuldade === "medio") max_erros = 6;
    else max_erros = 4;

    render();
}

function desenharForca() {
    const c = document.getElementById("forca");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,200,200);

    ctx.strokeStyle = "white";

    // base
    ctx.beginPath();
    ctx.moveTo(10,190);
    ctx.lineTo(190,190);
    ctx.stroke();

    if (erros > 0) {
        ctx.beginPath();
        ctx.moveTo(50,190);
        ctx.lineTo(50,20);
        ctx.lineTo(120,20);
        ctx.lineTo(120,40);
        ctx.stroke();
    }

    if (erros > 1) { // cabeça
        ctx.beginPath();
        ctx.arc(120,60,20,0,Math.PI*2);
        ctx.stroke();
    }

    if (erros > 2) { // corpo
        ctx.beginPath();
        ctx.moveTo(120,80);
        ctx.lineTo(120,140);
        ctx.stroke();
    }

    if (erros > 3) { // braço esquerdo
        ctx.beginPath();
        ctx.moveTo(120,100);
        ctx.lineTo(90,120);
        ctx.stroke();
    }

    if (erros > 4) { // braço direito
        ctx.beginPath();
        ctx.moveTo(120,100);
        ctx.lineTo(150,120);
        ctx.stroke();
    }

    if (erros > 5) { // perna esquerda
        ctx.beginPath();
        ctx.moveTo(120,140);
        ctx.lineTo(90,170);
        ctx.stroke();
    }

    if (erros > 6) { // perna direita
        ctx.beginPath();
        ctx.moveTo(120,140);
        ctx.lineTo(150,170);
        ctx.stroke();
    }
}

function render() {
    desenharForca();

    const tempo = Math.floor((Date.now() - inicio) / 1000);

    document.getElementById("info").innerText =
        `Tempo: ${tempo}s | Erros: ${erros} | Pontos: ${pontos}`;

    const palavraMostrada = palavra
        .split("")
        .map(l => letras.includes(l) ? l : "_")
        .join(" ");

    document.getElementById("palavra").innerText = palavraMostrada;

    const ganhou = !palavraMostrada.includes("_");
    const perdeu = erros >= max_erros;

    if (ganhou) {
        if (pontos > recorde) {
            recorde = pontos;
            localStorage.setItem("recorde", recorde);
            document.getElementById("recorde").innerText = recorde;
        }

        document.getElementById("status").innerHTML =
            `<span class="vitoria">🎉 Você venceu!</span><br><button onclick="iniciar()">Jogar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    if (perdeu) {
        document.getElementById("status").innerHTML =
            `<span class="derrota">💀 Você perdeu! Palavra: ${palavra}</span><br><button onclick="iniciar()">Tentar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    const alfabeto = "abcdefghijklmnopqrstuvwxyz";

    document.getElementById("letras").innerHTML = alfabeto
        .split("")
        .map(l => letras.includes(l) ? "" : `<button onclick="jogar('${l}')">${l}</button>`)
        .join("");
}

function jogar(letra) {
    letras.push(letra);

    if (palavra.includes(letra)) {
        pontos += 10;
        document.getElementById("acerto").play();
    } else {
        erros++;
        pontos -= 5;
        document.getElementById("erro").play();
    }

    render();
}

iniciar();
</script>

</body>
</html>
