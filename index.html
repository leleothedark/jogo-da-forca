<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forca Pro</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

h1 { margin-top: 10px; }

select, button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
}

canvas {
    background: #111;
    border-radius: 10px;
    margin: 10px;
}

#palavra {
    font-size: 28px;
    letter-spacing: 8px;
    margin: 20px 0;
}

.vitoria { color: #00ff88; }
.derrota { color: red; }

@media (max-width: 600px) {
    #palavra { font-size: 22px; }
}
</style>
</head>

<body>

<h1>🪓 FORCA PRO</h1>

<select id="categoria" onchange="iniciar()">
<option value="animais">Animais</option>
<option value="frutas">Frutas</option>
<option value="paises">Países</option>
</select>

<select id="dificuldade" onchange="iniciar()">
<option value="facil">Fácil</option>
<option value="medio">Médio</option>
<option value="dificil">Difícil</option>
</select>

<canvas id="forca" width="200" height="200"></canvas>

<p id="info"></p>
<div id="palavra"></div>
<p id="status"></p>
<div id="letras"></div>

<script>
const PALAVRAS = {
    animais: ["gato","elefante","tigre","girafa","leao","urso","panda","macaco"],
    frutas: ["banana","maca","uva","manga","abacaxi","pera","morango"],
    paises: ["brasil","canada","japao","mexico","espanha","egito","alemanha"]
};

let palavra = "";
let ultimaPalavra = "";
let letras = [];
let erros = 0;
let pontos = 0;
let inicio;
let max_erros = 6;

function iniciar() {
    const categoria = document.getElementById("categoria").value;
    const dificuldade = document.getElementById("dificuldade").value;
    const lista = PALAVRAS[categoria];

    // evitar repetir palavra
    do {
        palavra = lista[Math.floor(Math.random() * lista.length)];
    } while (palavra === ultimaPalavra);

    ultimaPalavra = palavra;

    letras = [];
    erros = 0;
    pontos = 0;
    inicio = Date.now();

    if (dificuldade === "facil") max_erros = 8;
    else if (dificuldade === "medio") max_erros = 6;
    else max_erros = 4;

    document.getElementById("status").innerHTML = "";
    document.getElementById("letras").innerHTML = "";

    render();
}

function desenhar() {
    const c = document.getElementById("forca");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,200,200);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(10,190); ctx.lineTo(190,190);
    ctx.moveTo(50,190); ctx.lineTo(50,20);
    ctx.lineTo(120,20); ctx.lineTo(120,40);
    ctx.stroke();

    if (erros > 0) { ctx.beginPath(); ctx.arc(120,60,20,0,Math.PI*2); ctx.stroke(); }
    if (erros > 1) { ctx.beginPath(); ctx.moveTo(120,80); ctx.lineTo(120,140); ctx.stroke(); }
    if (erros > 2) { ctx.beginPath(); ctx.moveTo(120,100); ctx.lineTo(90,120); ctx.stroke(); }
    if (erros > 3) { ctx.beginPath(); ctx.moveTo(120,100); ctx.lineTo(150,120); ctx.stroke(); }
    if (erros > 4) { ctx.beginPath(); ctx.moveTo(120,140); ctx.lineTo(90,170); ctx.stroke(); }
    if (erros > 5) { ctx.beginPath(); ctx.moveTo(120,140); ctx.lineTo(150,170); ctx.stroke(); }
}

function render() {
    desenhar();

    const tempo = Math.floor((Date.now() - inicio) / 1000);

    document.getElementById("info").innerText =
        `Tempo: ${tempo}s | Erros: ${erros}/${max_erros} | Pontos: ${pontos}`;

    const palavraMostrada = palavra
        .split("")
        .map(l => letras.includes(l) ? l : "_")
        .join(" ");

    document.getElementById("palavra").innerText = palavraMostrada;

    const ganhou = !palavraMostrada.includes("_");
    const perdeu = erros >= max_erros;

    if (ganhou) {
        document.getElementById("status").innerHTML =
            `<span class="vitoria">🎉 Vitória!</span><br><button onclick="iniciar()">Jogar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    if (perdeu) {
        document.getElementById("status").innerHTML =
            `<span class="derrota">💀 Derrota! Palavra: ${palavra}</span><br><button onclick="iniciar()">Tentar novamente</button>`;
        document.getElementById("letras").innerHTML = "";
        return;
    }

    const alfabeto = "abcdefghijklmnopqrstuvwxyz";

    document.getElementById("letras").innerHTML = alfabeto
        .split("")
        .map(l => letras.includes(l) ? "" : `<button onclick="jogar('${l}')">${l}</button>`)
        .join("");
}

function jogar(letra) {
    letras.push(letra);

    if (palavra.includes(letra)) {
        pontos += 10;
    } else {
        erros++;
        pontos -= 5;
    }

    render();
}

iniciar();
</script>

</body>
</html>
