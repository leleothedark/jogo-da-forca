<!DOCTYPE html>
<html>
<head>
    <title>Forca</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle, #141e30, #0f0c29);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px black;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #00c6ff;
            color: white;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🪓 FORCA</h1>
    <p>Escolha uma categoria:</p>

    <a href="/start/animais"><button>Animais</button></a>
    <a href="/start/frutas"><button>Frutas</button></a>
    <a href="/start/paises"><button>Países</button></a>

</div>

</body>
</html>
